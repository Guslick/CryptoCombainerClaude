<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CryptoTrader Mini App</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body style="font-family: Arial, sans-serif; margin: 16px;">
<h3>CryptoTrader Mini App (MVP)</h3>
<label>Coin: <input id="coin" value="Bitcoin"></label><br>
<label>TradingSum: <input id="sum" type="number" value="50"></label><br>
<button onclick="startTest()">Start Test</button>
<button onclick="stopTrading()">Stop</button>
<button onclick="loadStatus()">Status</button>
<pre id="out"></pre>
<script>
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }
const BASE = location.origin;
async function loadStatus(){
  const r=await fetch(`${BASE}/api/status`);document.getElementById('out').textContent=await r.text();
}
async function startTest(){
  const payload={coin:document.getElementById('coin').value,tradingSum:Number(document.getElementById('sum').value),buyGap:3,profitGap:2,lossGap:3,updateTimeout:15,chatId:Number(tg?.initDataUnsafe?.user?.id||0)};
  const r=await fetch(`${BASE}/api/trade/start-test`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
  document.getElementById('out').textContent=await r.text();
}
async function stopTrading(){
  const r=await fetch(`${BASE}/api/trade/stop`,{method:'POST'});document.getElementById('out').textContent=await r.text();
}
</script>
</body>
</html>
